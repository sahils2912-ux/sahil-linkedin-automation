name: Daily LinkedIn Post

on:
  schedule:
    # 09:00 India time. Buffer should publish the queued post at 09:30.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate without adding to Buffer"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  models: read

concurrency:
  group: daily-linkedin-post
  cancel-in-progress: false

jobs:
  create-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate and queue LinkedIn post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4o-mini' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: npm run post
